<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RF Social Studio &mdash; Calm operations for a sharper content system.</title>
    <meta name="description" content="A social-content studio shaped to feel like a working studio. Plan, design, and publish across Instagram, LinkedIn, TikTok, and Facebook in one calm space. Editorial rhythm &mdash; calm by default, dense when you need it." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RF Social Studio" />
    <meta property="og:title" content="Calm operations for a sharper content system." />
    <meta property="og:description" content="One workspace for planning, designing, and publishing across Instagram, LinkedIn, TikTok, and Facebook. Free tier, no card required." />
    <meta property="og:url" content="https://www.rangerandfox-social.studio" />
    <meta property="og:image" content="https://www.rangerandfox-social.studio/og-cover.svg" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RF Social Studio" />
    <meta name="twitter:description" content="Calm operations for a sharper content system." />
    <meta name="twitter:image" content="https://www.rangerandfox-social.studio/og-cover.svg" />

    <!-- Theme color for mobile browser chrome (matches warm-paper palette) -->
    <meta name="theme-color" content="#f3eee5" />

    <!-- Security: control referrer information sent with requests -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!--
      CSP is delivered via HTTP headers in vercel.json so directives like
      frame-ancestors and worker-src are enforced correctly in production.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
