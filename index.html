<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RF Social Studio</title>

    <!-- Security: control referrer information sent with requests -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!--
      Content Security Policy
      ─────────────────────────────────────────────────────────────────────────
      - default-src 'self'          only load resources from same origin by default
      - script-src 'self' https://*.clerk.accounts.dev
                                    allow Clerk to load its hosted auth bundle
      - style-src 'self' 'unsafe-inline' https://fonts.googleapis.com
                                    inline styles needed for the template-literal
                                    CSS injected by React (G string); Google Fonts
      - font-src 'self' https://fonts.gstatic.com
                                    Google Fonts glyphs
      - img-src 'self' data: blob: https:
                                    blob: for local file previews; remote auth/media
      - connect-src 'self' https://api.instagram.com https://graph.instagram.com https://*.clerk.accounts.dev https://*.clerk.dev https://clerk.com
                                    IG OAuth + Clerk auth
      - frame-src 'self' https://*.clerk.accounts.dev https://challenges.cloudflare.com
                                    Clerk auth UI and challenge flows
      - frame-ancestors 'none'      prevent this app from being embedded
      - object-src 'none'           no Flash / plugins
      - base-uri 'self'             prevent base-tag injection
      - form-action 'self' https://*.clerk.accounts.dev
                                    allow Clerk-hosted auth submissions
      ─────────────────────────────────────────────────────────────────────────
      NOTE: 'unsafe-inline' for style-src is required because App.jsx injects
      a CSS template-literal string via <style>{G}</style> at runtime. A future
      refactor to a static .css file (or style nonce) would allow removing it.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' https://*.clerk.accounts.dev;
      script-src-elem 'self' https://*.clerk.accounts.dev;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https:;
      connect-src 'self' https://api.instagram.com https://graph.instagram.com https://*.clerk.accounts.dev https://*.clerk.dev https://clerk.com;
      frame-src 'self' https://*.clerk.accounts.dev https://challenges.cloudflare.com;
      frame-ancestors 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self' https://*.clerk.accounts.dev;
    " />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
