<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connecting LinkedIn&hellip;</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600&family=Bricolage+Grotesque:wght@600;700&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Inter',system-ui,sans-serif;color:#181714;background:
      radial-gradient(circle at 12% 8%, rgba(255,180,120,0.18), transparent 18%),
      radial-gradient(circle at 82% 16%, rgba(110,170,255,0.12), transparent 16%),
      linear-gradient(180deg, rgba(255,255,255,0.38), rgba(255,255,255,0) 24%),
      #F3EEE5;
      -webkit-font-smoothing:antialiased;letter-spacing:-0.01em}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:40px 20px}
    .card{max-width:420px;width:100%;background:rgba(254,252,248,0.9);backdrop-filter:blur(20px);
      border:1px solid rgba(24,23,20,0.08);border-radius:20px;padding:36px 32px;text-align:center;
      box-shadow:0 32px 80px rgba(24,23,20,0.08)}
    .badge{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#FF7A00,#F0B24D,#D99BFF,#82C7FF);
      margin:0 auto 20px;display:flex;align-items:center;justify-content:center;
      font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#181714;
      box-shadow:0 14px 28px rgba(229,106,11,0.2)}
    h1{font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:700;
      letter-spacing:-0.04em;line-height:1.15;margin-bottom:8px}
    p{font-size:14px;color:#5E574C;line-height:1.55;margin-bottom:16px}
    .err{color:#DC2626}
    .spinner{width:24px;height:24px;border:2px solid rgba(24,23,20,0.1);border-top-color:#181714;
      border-radius:50%;animation:spin 0.8s linear infinite;margin:12px auto 0}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">RF</div>
      <h1 id="title">Connecting LinkedIn&hellip;</h1>
      <p id="message">Securing the connection. This window will close automatically.</p>
      <div class="spinner" id="spinner"></div>
    </div>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get("code");
      var state = params.get("state");
      var error = params.get("error");
      var errorReason = params.get("error_description") || error;

      function setStatus(title, message, isError) {
        document.getElementById("title").textContent = title;
        document.getElementById("message").textContent = message;
        if (isError) {
          document.getElementById("message").classList.add("err");
          var spinner = document.getElementById("spinner");
          if (spinner) spinner.style.display = "none";
        }
      }

      function notifyParent(payload) {
        if (!window.opener || window.opener.closed) return false;
        try {
          window.opener.postMessage(
            { type: "rf_li_oauth", ...payload },
            window.location.origin
          );
          return true;
        } catch (e) {
          return false;
        }
      }

      if (error) {
        setStatus("Connection cancelled", errorReason || "You can try again whenever you're ready.", true);
        notifyParent({ ok: false, error: errorReason || error });
        setTimeout(function () { window.close(); }, 2500);
        return;
      }

      if (!code || !state) {
        setStatus("Missing OAuth response", "The LinkedIn callback didn't include the required parameters.", true);
        notifyParent({ ok: false, error: "Missing OAuth code or state" });
        setTimeout(function () { window.close(); }, 2500);
        return;
      }

      var sent = notifyParent({ ok: true, code: code, state: state });
      if (sent) {
        setStatus("Connected", "All set. You can close this window if it doesn't close automatically.");
        setTimeout(function () { window.close(); }, 800);
      } else {
        setStatus("Connection complete", "Return to the studio tab to finish setup.", false);
      }
    })();
  </script>
</body>
</html>
