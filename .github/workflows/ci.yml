name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      # Real-browser tier (test:browser) needs a chromium matching the
      # installed @playwright/test. Installed before the gate runs.
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # One canonical release gate: lint → node tests (validation, server,
      # persistence, deployment-contract, route-smoke) → vitest → production
      # build → real-browser tier. Fail-fast; any tier's failure fails CI.
      - name: Release gate
        run: npm run release:check
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
